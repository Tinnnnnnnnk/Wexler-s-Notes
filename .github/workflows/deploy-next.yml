name: Deploy Next

on:
  push:
    branches: [feat/next-cutover]
  workflow_dispatch:

concurrency:
  group: deploy-next
  cancel-in-progress: false

jobs:
  build:
    name: Build Next
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wexler-notes-next/package-lock.json

      - name: Install dependencies
        working-directory: wexler-notes-next
        run: npm ci

      - name: Migrate content
        working-directory: wexler-notes-next
        run: npm run migrate

      - name: Build
        working-directory: wexler-notes-next
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=3072'
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wexler-next-dist
          path: |
            wexler-notes-next/out/
            wexler-notes-next/package.json
            wexler-notes-next/package-lock.json
          retention-days: 3

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/feat/next-cutover'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wexler-next-dist
          path: dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_HOST_KEY }}" > ~/.ssh/known_hosts
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_PORT || '22' }}" \
            dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Health check
        run: |
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.NEXT_PUBLIC_SITE_URL }}/" || echo "000")
          echo "Site returned HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then echo "✅ Deploy verified"; else echo "⚠️  Site returned $HTTP_CODE — check manually"; fi
