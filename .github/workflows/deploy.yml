name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy By SSH Pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 30m
          script: |
            set -e

            if [ -d "/root/Wexler-s-Notes" ]; then
              APP_DIR="/root/Wexler-s-Notes"
            elif [ -d "/home/ubuntu/Wexler-s-Notes" ]; then
              APP_DIR="/home/ubuntu/Wexler-s-Notes"
            elif [ -d "$HOME/Wexler-s-Notes" ]; then
              APP_DIR="$HOME/Wexler-s-Notes"
            else
              echo "Repository directory not found. Clone repo on server first."
              exit 1
            fi

            cd "$APP_DIR"
            git pull origin main

            if docker info >/dev/null 2>&1; then
              DOCKER="docker"
            else
              DOCKER="sudo docker"
            fi

            $DOCKER build -t wexler-notes-image .
            $DOCKER rm -f my-nginx || true
            $DOCKER run -d -p 80:80 --name my-nginx --restart unless-stopped wexler-notes-image
            $DOCKER system prune -f
