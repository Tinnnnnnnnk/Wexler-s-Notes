name: 🌟 Deploy

# 触发条件：当你推送到 main 分支时自动执行
on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 登录服务器拉取最新代码并重启 Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 🌟 增加超时限制到 30 分钟，给网络波动留够缓冲
          command_timeout: 30m
          script: |
            cd /root/Wexler-s-Notes
            git pull origin main
            # 构建并运行
            docker build -t wexler-notes-image .
            docker rm -f my-nginx || true
            docker run -d -p 80:80 --name my-nginx wexler-notes-image
            docker system prune -f
