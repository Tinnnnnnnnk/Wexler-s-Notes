name: Temporary Build Verification

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd wexler-notes-next
          npm ci
        continue-on-error: true

      - name: Run Lint
        run: |
          cd wexler-notes-next
          npm run lint
        continue-on-error: true

      - name: Run Build
        run: |
          cd wexler-notes-next
          npm run build
        continue-on-error: true

      - name: Check Export Output
        run: |
          cd wexler-notes-next
          echo "=== Export Directory ==="
          ls -la out/ 2>/dev/null || echo "No out directory"
          echo ""
          echo "=== HTML Files Count ==="
          find out -name "*.html" 2>/dev/null | wc -l
          echo ""
          echo "=== Error Pages Check ==="
          grep -r "__next_error__" out/ 2>/dev/null | wc -l || echo "0"
          echo ""
          echo "=== Sample HTML Files ==="
          find out/docs -name "*.html" 2>/dev/null | head -20 || echo "No docs found"

      - name: Run Stage3 Self Check
        run: |
          cd wexler-notes-next
          npx tsx scripts/stage3-self-check.ts
        continue-on-error: true

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: wexler-notes-next/out
          retention-days: 7
