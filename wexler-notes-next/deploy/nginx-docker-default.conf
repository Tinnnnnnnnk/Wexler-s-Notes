# Next.js static export (out/) — use INSIDE my-nginx container
# Mount or copy to: /etc/nginx/conf.d/default.conf
# Then: docker exec my-nginx nginx -s reload
#
# DO NOT use proxy_pass for /_next/ — assets are plain files under root.

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Static export: paths like /docs/Code/DS/BFS → docs/Code/DS/BFS.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
