# Nginx Security Headers Configuration
# For Wexler's Notes Next.js Static Export
#
# Usage:
# 1. Copy this file to /etc/nginx/snippets/wexler-security-headers.conf
# 2. Include in your site configuration:
#    include /etc/nginx/snippets/wexler-security-headers.conf;
#
# Or paste directly into your server block.

# ===========================================
# Security Headers
# ===========================================

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking attacks
add_header X-Frame-Options "SAMEORIGIN" always;

# Enable strict transport security (HSTS)
# Uncomment and adjust max-age after testing
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Disable Power Features (camera, microphone, etc.)
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# ===========================================
# Content Security Policy (CSP)
# ===========================================

# Report-Only CSP (recommended for first deployment)
# Uncomment after testing to see violations without blocking
# add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

# Production CSP (strict mode)
# Uncomment this and remove Report-Only after testing
# add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

# ===========================================
# Additional Security Headers
# ===========================================

# Remove server identification
# Note: This requires nginx.conf: server_tokens off;
# add_header Server "WexlerNotes" always;

# X-XSS Protection (legacy, but good for older browsers)
add_header X-XSS-Protection "1; mode=block" always;

# ===========================================
# Static Export Specific Settings
# ===========================================

# Enable gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

# Cache static assets
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Cache HTML files (short TTL for updates)
location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# ===========================================
# Rate Limiting (Optional)
# ===========================================

# Define rate limit zone
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Apply rate limiting to API routes
# location /api/ {
#     limit_req zone=api burst=20 nodelay;
# }

